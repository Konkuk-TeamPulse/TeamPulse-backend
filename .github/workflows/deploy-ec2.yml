name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/teampulse-key.pem
          chmod 600 ~/.ssh/teampulse-key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/teampulse-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            cd ~/TeamPulse-backend

            git fetch origin main
            git reset --hard origin/main

            chmod +x ./mvnw
            ./mvnw clean package -DskipTests

            source ~/.teampulse.env

            OLD_PID=$(pgrep -f '[j]ava -jar target/backend-0.0.1-SNAPSHOT.jar' || true)

            if [ -n "$OLD_PID" ]; then
              echo "Stopping old backend process: $OLD_PID"
              kill $OLD_PID
              sleep 2
            else
              echo "No old backend process found"
            fi

            nohup java -jar target/backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            sleep 8

            if pgrep -f '[j]ava -jar target/backend-0.0.1-SNAPSHOT.jar' > /dev/null; then
              echo "Backend started successfully"
              tail -n 50 app.log
            else
              echo "Backend failed to start"
              tail -n 100 app.log
              exit 1
            fi
          EOF