spring.application.name=teampulse-backend
spring.profiles.default=mysql
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.jackson.time-zone=Asia/Seoul
management.endpoints.web.exposure.include=health,info
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://team-pulse-frontend.vercel.app,https://teampulse.com,https://www.teampulse.com}
app.frontend.public-base-url=${APP_FRONTEND_PUBLIC_BASE_URL:https://team-pulse-frontend.vercel.app}
app.runtime.storage-mode=mysql
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

#---
spring.config.activate.on-profile=demo
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
app.runtime.storage-mode=demo
