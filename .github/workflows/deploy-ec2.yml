name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/teampulse-key.pem
          chmod 600 ~/.ssh/teampulse-key.pem

          if ! ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Failed to reach EC2 SSH host."
            exit 1
          fi

          ssh -o ConnectTimeout=10 -o ServerAliveInterval=15 -i ~/.ssh/teampulse-key.pem "$EC2_USER@$EC2_HOST" 'bash -se' << 'EOF'
            set -e

            cd ~/TeamPulse-backend

            echo "Pulling latest code..."
            git pull origin main

            echo "Building Spring Boot jar..."
            chmod +x ./mvnw
            ./mvnw clean package spring-boot:repackage -DskipTests

            OLD_PID=$(pgrep -f '[b]ackend-0.0.1-SNAPSHOT.jar' || true)

            if [ -n "$OLD_PID" ]; then
              echo "Stopping old backend process: $OLD_PID"
              kill $OLD_PID || true
              sleep 3
            else
              echo "No old backend process found"
            fi

            if [ ! -f .env ]; then
              echo "Missing .env"
              exit 1
            fi

            echo "Loading environment variables..."
            set -a
            source .env
            set +a

            rm -f app.log

            echo "Starting backend..."
            nohup java -jar target/backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "Backend launch command executed"
            echo "Waiting for backend health check..."

            for i in {1..30}; do
              if curl --fail --max-time 5 http://localhost:8080/api/health; then
                echo "Backend health check succeeded"
                exit 0
              fi

              echo "Backend not ready yet... attempt $i/30"
              sleep 3
            done

            echo "Backend failed to start. Recent app.log:"
            tail -100 app.log

            exit 1
          EOF