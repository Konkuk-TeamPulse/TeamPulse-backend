app.runtime.storage-mode=mysql
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/mysql
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.encoding=UTF-8
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}
app.security.public-api-docs=${APP_PUBLIC_API_DOCS:false}
app.security.public-roadmap=${APP_PUBLIC_ROADMAP:false}
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
app.security.login.max-tracked-emails=${APP_LOGIN_MAX_TRACKED_EMAILS:10000}
