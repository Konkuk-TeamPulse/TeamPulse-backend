name: Backend CI and Deploy to EC2

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x ./mvnw
          ./mvnw test -Dspring.profiles.active=demo

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/teampulse-key.pem
          chmod 600 ~/.ssh/teampulse-key.pem

          if ! ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Failed to reach EC2 SSH host."
            exit 1
          fi

          ssh -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=20 -i ~/.ssh/teampulse-key.pem "$EC2_USER@$EC2_HOST" 'bash -se' << 'EOF'
            set -e

            cd ~/TeamPulse-backend

            echo "Pulling latest code..."
            git pull origin main

            if [ ! -f .env ]; then
              echo "::error::Missing .env on deployment server."
              exit 1
            fi

            echo "Loading environment variables from .env..."
            set -a
            source .env
            set +a

            echo "Checking required environment variables..."

            REQUIRED_ENV_VARS=(
              "SPRING_DATASOURCE_URL"
              "SPRING_DATASOURCE_USERNAME"
              "SPRING_DATASOURCE_PASSWORD"
            )

            for KEY in "${REQUIRED_ENV_VARS[@]}"; do
              if [ -z "${!KEY}" ]; then
                echo "::error::Missing required environment variable: $KEY"
                exit 1
              fi
              echo "$KEY=SET"
            done

            OPTIONAL_ENV_VARS=(
              "SPRING_PROFILES_ACTIVE"
              "APP_CORS_ALLOWED_ORIGINS"
              "APP_FRONTEND_PUBLIC_BASE_URL"
            )

            for KEY in "${OPTIONAL_ENV_VARS[@]}"; do
              if [ -z "${!KEY}" ]; then
                echo "$KEY=DEFAULT"
              else
                echo "$KEY=SET"
              fi
            done

            echo "Building Spring Boot jar..."
            chmod +x ./mvnw
            timeout 600s ./mvnw clean package spring-boot:repackage -Dspring.profiles.active=demo

            OLD_PID=$(pgrep -f '[b]ackend-0.0.1-SNAPSHOT.jar' || true)

            if [ -n "$OLD_PID" ]; then
              echo "Stopping old backend process: $OLD_PID"
              kill $OLD_PID || true
              sleep 5

              if pgrep -f '[b]ackend-0.0.1-SNAPSHOT.jar' > /dev/null; then
                echo "Old backend process still alive. Force killing..."
                pkill -9 -f '[b]ackend-0.0.1-SNAPSHOT.jar' || true
                sleep 2
              fi
            else
              echo "No old backend process found"
            fi

            rm -f app.log

            echo "Starting backend..."
            nohup java -jar target/backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 < /dev/null &
            BACKEND_PID=$!
            disown -a 2>/dev/null || true

            echo "Backend launch command executed with PID $BACKEND_PID"
            echo "Waiting for backend health check..."

            for i in {1..30}; do
              if curl --fail --max-time 5 http://localhost:8080/api/health; then
                echo "Backend health check succeeded"
                exit 0
              fi

              echo "Backend not ready yet... attempt $i/30"
              sleep 3
            done

            echo "Backend failed to start. Recent app.log:"
            tail -100 app.log

            exit 1
          EOF
