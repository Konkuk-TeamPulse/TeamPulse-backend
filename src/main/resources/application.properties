spring.application.name=teampulse-backend
spring.profiles.default=demo
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.jackson.time-zone=Asia/Seoul
management.endpoints.web.exposure.include=health,info
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://teampulse-frontend-ruddy.vercel.app,https://team-pulse-frontend.vercel.app}
app.runtime.storage-mode=demo
