name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/teampulse-key.pem
          chmod 600 ~/.ssh/teampulse-key.pem

          if ! ssh-keyscan -T 10 -H "$EC2_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::Failed to reach EC2 SSH host. Check EC2_HOST, instance public IP, security group inbound TCP 22, and network ACLs."
            exit 1
          fi

          ssh -o ConnectTimeout=10 -o ServerAliveInterval=15 -i ~/.ssh/teampulse-key.pem "$EC2_USER@$EC2_HOST" << 'EOF'
            set -e

            cd ~/TeamPulse-backend

            git fetch origin main
            git reset --hard origin/main

            chmod +x ./mvnw
            ./mvnw clean package -DskipTests

            if [ ! -f ~/.teampulse.env ]; then
              echo "Missing ~/.teampulse.env"
              exit 1
            fi

            set -a
            source ~/.teampulse.env
            set +a

            echo "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE"
            echo "APP_CORS_ALLOWED_ORIGINS=$APP_CORS_ALLOWED_ORIGINS"

            OLD_PID=$(pgrep -f '[j]ava -jar target/backend-0.0.1-SNAPSHOT.jar' || true)

            if [ -n "$OLD_PID" ]; then
              echo "Stopping old backend process: $OLD_PID"
              kill $OLD_PID
              sleep 2
            else
              echo "No old backend process found"
            fi

            nohup java -jar target/backend-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "Waiting for backend process and port 8080..."

            for i in {1..40}; do
              if ! pgrep -f '[j]ava -jar target/backend-0.0.1-SNAPSHOT.jar' > /dev/null; then
                echo "Backend process is not running"
                tail -n 150 app.log
                exit 1
              fi

              if ss -ltn | grep -q ':8080 '; then
                echo "Backend process is running and port 8080 is open"
                echo "Optional health response:"
                curl -i http://127.0.0.1:8080/api/health || true
                tail -n 80 app.log
                exit 0
              fi

              echo "Waiting... Retry $i/40"
              sleep 3
            done

            echo "Backend failed to open port 8080 after waiting"
            tail -n 150 app.log
            exit 1
          EOF