spring.application.name=teampulse-backend
spring.profiles.default=demo
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.jackson.time-zone=Asia/Seoul
management.endpoints.web.exposure.include=health,info
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://teampulse-frontend-ruddy.vercel.app}
app.runtime.storage-mode=demo
spring.flyway.enabled=false
springdoc.api-docs.path=/v3/api-docs
app.jwt.secret=${APP_JWT_SECRET:local-development-secret-change-before-production-please}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
app.security.login.max-failures=${APP_LOGIN_MAX_FAILURES:5}
app.security.login.lockout-minutes=${APP_LOGIN_LOCKOUT_MINUTES:15}
app.security.login.max-tracked-emails=${APP_LOGIN_MAX_TRACKED_EMAILS:10000}
app.security.public-api-docs=${APP_PUBLIC_API_DOCS:true}
app.security.public-roadmap=${APP_PUBLIC_ROADMAP:false}
